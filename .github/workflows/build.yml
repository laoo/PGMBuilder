name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: native
            artifact_name: PGMBuilder-ubuntu
            artifact_path: out/build/native/PGMBuilder
          - os: macos-latest
            preset: native
            artifact_name: PGMBuilder-macos
            artifact_path: out/build/native/PGMBuilder
          - os: windows-latest
            preset: vs-windows
            artifact_name: PGMBuilder-windows
            artifact_path: out/build/vs-windows/PGMBuilder.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show CMake Version
        run: cmake --version

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error